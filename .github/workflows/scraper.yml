name: Scraper diario de precios

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # Playwright es más lento — subimos de 45 a 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Instalar dependencias Python
        run: pip install -r scraper/requirements.txt

      - name: Instalar browser Playwright       # ← LÍNEA NUEVA
        run: playwright install chromium --with-deps

      - name: Correr scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scraper/scraper.py
```

Los dos cambios respecto al original: `timeout-minutes: 90` (Playwright con 5 cadenas puede tardar 30-60 min) y el paso `playwright install chromium --with-deps` que descarga el browser headless.

